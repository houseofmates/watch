name: watch
description: Media server and player — Linux, Android, Web from one Flutter codebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  go_router: ^14.3.0
  path: ^1.9.0
  path_provider: ^2.1.4
  intl: ^0.19.0
  shared_preferences: ^2.3.2

  video_player: ^2.8.6
  audioplayers: ^6.1.0
  chewie: ^1.8.5
  photo_view: ^0.15.0
  file_picker: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
